[commands.tokenize-paper]
description = "Generate a context JSON file with key takeaways of the paper"
prompt="""
Analyze these files carefully:
1. Summarize key findings and takeaway messages
2. Extract an index of all defined variables,
3. A list of active statistical models used,
4. An 1-sentence summary of what each code chunk does and how it relates to the main key paper findings.

OUTPUT REQUIREMENT:
Return ONLY the raw JSON object string data. Do NOT use any markdown formatting blocks. Do NOT wrap the data inside backticks (```) or ```json code fences. Do NOT include any conversational preamble or summary introduction text outside the JSON structure. Start your response directly with { and end it directly with }.
"""
[commands.explain]
description = "Generate a draft of a *-explainer.Rmd document following strict tech stack rules."
prompt = """
Examine the requested paper's analysis code and write an explainer matching our strict typography:
1. Start with 2 context sentences (algorithm/metrics).
2. Explicitly define key terms (baseline, delta, max_gens).
3. Use 3-5 visuals matching our ggplot2/linewidth standards.
4. Close with practical implications and reproducibility.
5. Use American spelling and inline citations.
Join names with ' & ' in the author field.
"""

[commands.annotate]
description = "Draft a *-annotated.Rnw file safely escaping LaTeX characters."
prompt = """
Examine the source .Rnw paper and output the structural modifications required for an annotated version.
Ensure you use \\input{lib/annotations.tex}.
Utilize: \\keyfinding, \\methodstep, \\codelink, \\important, or \\reference.
CRITICAL: Escape all underscores in technical names (e.g., use max\\_gens or \\texttt{max_gens}) to ensure LaTeX syntax safety.
"""

---
name: rmd-explainer
description: Standard guidelines for compiling R Markdown progression explainers.
---
# Detailed Explainer Rules
- Establish an opening 2-sentence structural introduction tracking the specific algorithm and metrics.
- Enforce American spelling.
- Ensure all underscores in technical names are escaped (e.g., max\_gens).
- Map statistical shifts to changepoint detection, explicitly using `wilcox.test()`.