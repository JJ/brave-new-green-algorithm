# R CMD check for the energyR package
#
# Runs on every push / PR that touches the energyR/ subtree, and can also be
# triggered manually via the Actions tab.  Three OS targets are checked to
# catch platform-specific issues before a potential CRAN submission.
#
# Secrets required: none (public repo).
# Cache key: R version + hash of DESCRIPTION + hash of all R sources.

on:
  push:
    paths:
      - 'energyR/**'
      - '.github/workflows/R-CMD-check.yml'
  pull_request:
    paths:
      - 'energyR/**'
      - '.github/workflows/R-CMD-check.yml'
  workflow_dispatch:

name: R CMD check (energyR)

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest,  r: 'release' }
          - { os: ubuntu-latest,  r: 'devel',   http-user-agent: 'release' }
          - { os: windows-latest, r: 'release' }
          - { os: macos-latest,   r: 'release' }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: energyR
          extra-packages: |
            any::rcmdcheck
            any::testthat
            any::knitr
            any::rmarkdown
            any::kableExtra
            any::reshape2
            any::ggridges

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: energyR
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          args: 'c("--no-manual", "--as-cran")'
