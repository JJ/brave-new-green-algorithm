# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout

        uses: actions/checkout@v5
      - name: Install pandoc
        run: sudo apt-get install -y pandoc
      - name: Generate index.html from README.md
        run: |
          pandoc README.md \
            --standalone \
            --metadata title="Brave New Green Algorithm papers and presentations" \
            --css academic.css \
            --highlight-style tango \
            -o index.html
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
      - name: Install R dependencies
        run: install.packages(c("rmarkdown", "ggplot2", "dplyr", "knitr", "ggridges"))
        shell: Rscript {0}
      - name: Render all Rmd files to HTML
        run: |
          for f in *.Rmd; do
            Rscript -e "rmarkdown::render('${f}')"
          done
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
